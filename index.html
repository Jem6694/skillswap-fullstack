<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSwap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>SkillSwap</h1>
      <p class="tagline">Learn from students. Teach what you know. Build connections through skill exchange.</p>
      <div class="hero-actions">
        <button id="initBtn">Initialize App</button>
        <button id="seedBtn" class="secondary">Load Demo Data</button>
        <button id="resetBtn" class="danger">Reset Database</button>
      </div>
    </div>
  </header>

  <main class="container grid">
    <section class="card">
      <h2>Create Your Profile</h2>
      <form id="profileForm">
        <div class="field-row">
          <div>
            <label>Name</label>
            <input type="text" id="name" required />
          </div>
          <div>
            <label>Email</label>
            <input type="email" id="email" required />
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Major</label>
            <input type="text" id="major" />
          </div>
          <div>
            <label>Availability</label>
            <input type="text" id="availability" placeholder="Weekends, evenings, etc." />
          </div>
        </div>
        <label>Short Bio</label>
        <textarea id="bio" rows="3"></textarea>

        <label>Skills You Can Teach (comma-separated)</label>
        <input type="text" id="teach_skills" placeholder="Python, SQL, Excel" required />

        <label>Skills You Want to Learn (comma-separated)</label>
        <input type="text" id="learn_skills" placeholder="Financial Modeling, Tableau" required />

        <button type="submit">Save Profile</button>
      </form>
      <p id="currentUser"></p>
      <button id="findMatchesBtn" class="hidden">Find Matches</button>
    </section>

    <section class="card">
      <h2>Your Matches</h2>
      <div id="matches" class="list empty">No matches yet.</div>
    </section>

    <section class="card">
      <h2>Requests Dashboard</h2>
      <div id="requests" class="list empty">No requests yet.</div>
    </section>
  </main>

  <div id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
